<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Introduction</title>
</head>
<body>
    <h1>Let's try make a calculator</h1>
    <div class="container">
        <input type="text" id="inputOutputField" value="0" readonly>
        <div class="inputButtons">
            <button class="buttons" value="1">1</button>
            <button class="buttons" value="2">2</button>
            <button class="buttons" value="3">3</button>
            <button class="buttons" id="addition">+</button>
            <button class="buttons" value="4">4</button>
            <button class="buttons" value="5">5</button>
            <button class="buttons" value="6">6</button>
            <button class="buttons" id="substraction">-</button>
            <button class="buttons" value="7">7</button>
            <button class="buttons" value="8">8</button>
            <button class="buttons" value="9">9</button>
            <button class="buttons" id="multiply">*</button>
            <button class="buttons" id="delete">⌫</button>
            <button class="buttons" value="0">0</button>
            <button class="buttons" id="equals">=</button>
            <button class="buttons" id="divide">/</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
