<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-600">
    <h1 class="text-3xl font-bold text-center py-4 text-white uppercase">Gear Showroom</h1>
    <div class="flex p-4 justify-center gap-5">
        <button data-category="all" class="filter-btn">All</button>
        <button data-category="laptop" class="filter-btn">Laptop</button>
        <button data-category="keyboard" class="filter-btn">Keyboard</button>
        <button data-category="mouse" class="filter-btn">Mouse</button>
    </div>
    <input type="text" id="search-input" class="p-1 bg-white w-1/4 ml-6 my-2 rounded-lg placeholder: pl-2" placeholder="Search item">
    <div id="gear-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 p-5"></div>
    <script src="script.js"></script>
</body>
</html>
